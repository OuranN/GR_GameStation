<div class="add-game-card">
  <h2>EDITAR JOGO</h2>
  
  <form [formGroup]="form" (ngSubmit)="onUpdateGame()">
    <div class="form-group">
      <label>Título</label>
      <input
        type="text"
        placeholder="Ex: God of War Ragnarök"
        formControlName="titulo"
      >
    </div>

    <div class="form-group">
      <label>Imagem URL</label>
      @if (form.get('imgUrl')?.value) {
        <div class="center">
          <img [src]="form.get('imgUrl')?.value" alt="Preview da imagem do jogo" class="img-preview">
        </div>
        
      }
      <input
        type="text"
        placeholder="google.com.br" 
        formControlName="imgUrl"
        >
        
    </div>

    <div class="price-stock">
      <div class="form-group preco-field">
        <label>Preço (R$)</label>
        <input
          type="number" min="0" step="0.01" class="sem-setinhas" formControlName="preco"
        >
      </div>

      <div class="form-group estoque-field">
        <label>Estoque</label>
        <input
          type="number"
          value="1"
          formControlName="estoque"
        >
      
      </div>
    </div>


    <div class="form-group">
      <label>Plataforma</label>
      <div class="options-row">
        
        <div class="platform-group">
            <button type="button" class="option-btn" [class.active]="form.value.plataforma === 'PS5'" (click)="form.patchValue({ plataforma: 'PS5' })">PS5</button>
            <button type="button" class="option-btn" [class.active]="form.value.plataforma === 'PS4'" (click)="form.patchValue({ plataforma: 'PS4' })">PS4</button>
            <button type="button" class="option-btn" [class.active]="form.value.plataforma === 'PS3'" (click)="form.patchValue({ plataforma: 'PS3' })">PS3</button>
        </div>

        <div class="platform-group">
          <button type="button" class="option-btn" [class.active]="form.value.plataforma === 'SWITCH'" (click)="form.patchValue({ plataforma: 'SWITCH' })">SWITCH</button>
          <button type="button" class="option-btn" [class.active]="form.value.plataforma === 'SWITCH 2'" (click)="form.patchValue({ plataforma: 'SWITCH 2' })">SWITCH 2</button>
        </div>



        <div class="platform-group">
          <button type="button" class="option-btn" [class.active]="form.value.plataforma === 'XBOX Series S'" (click)="form.patchValue({ plataforma: 'XBOX Series S' })">XBOX Series S</button>
          <button type="button" class="option-btn" [class.active]="form.value.plataforma === 'XBOX Series X'" (click)="form.patchValue({ plataforma: 'XBOX Series X' })">XBOX Series X</button>
        </div>
        
        
      </div>
    </div>

    <div class="form-group">
      <label>Condição</label>
      <div class="options-row">
        <button type="button" class="option-btn" [class.active]="form.value.condicao === 'USADO'" (click)="form.patchValue({ condicao: 'USADO' })">USADO</button>
        <button type="button" class="option-btn" [class.active]="form.value.condicao === 'SEMINOVO'" (click)="form.patchValue({ condicao: 'SEMINOVO' })">SEMINOVO</button>
        <button type="button" class="option-btn" [class.active]="form.value.condicao === 'NOVO'" (click)="form.patchValue({ condicao: 'NOVO' })">NOVO</button>
      </div>
    </div>

    <div class="buttons">
      <button type="submit" class="salvar-button">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/>
          <polyline points="7 3 7 8 15 8"/>
        </svg>

        Salvar
      </button>

      <button class="cancel-button" type="button" (click)="onCancelUpdate()">
        Cancelar
      </button>
    </div>

  </form>
</div>
