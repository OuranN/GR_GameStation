<div class="game-item" [class.active]="selected()">

    <div class="game-info">

        <div class="title-row">
            <h3>{{game().nome}}</h3>
            <app-platform-tag [platformTag]="game().plataforma"></app-platform-tag>
        </div>

        <p class="details">
            {{game().preco | currency:'BRL'}} • {{game().plataforma}} • {{game().estoque}} em estoque
        </p>

    </div>

    <div class="actions">

        <button class="edit-btn"  (click)="onEditGame()">
            Editar
        </button>

        <button class="delete-btn" (click)="onDeleteGame()">
            <svg xmlns="http://www.w3.org/2000/svg"
                 width="20"
                 height="20"
                 viewBox="0 0 24 24"
                 fill="none"
                 stroke="currentColor"
                 stroke-width="2"
                 stroke-linecap="round"
                 stroke-linejoin="round">
                <path d="M3 6h18"/>
                <path d="M8 6V4h8v2"/>
                <path d="M19 6l-1 14H6L5 6"/>
                <path d="M10 11v6"/>
                <path d="M14 11v6"/>
            </svg>
        </button>

    </div>

</div>
